# Dream International — Netlify (site + /admin + /api on one domain)

[build]
  command = "npm run netlify-build"
  publish = "build"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"
  REACT_APP_API_URL = "/api"
  NODE_ENV = "production"
  NETLIFY = "true"
  CI = "false"
  NPM_FLAGS = "--legacy-peer-deps"
  SECRETS_SCAN_ENABLED = "false"

[functions]
  node_bundler = "esbuild"
  external_node_modules = [
    "@prisma/client",
    "@prisma/adapter-neon",
    "@neondatabase/serverless",
    "@supabase/storage-js",
    "resend",
    "ws"
  ]
  included_files = ["node_modules/@prisma/**", "node_modules/.prisma/**"]

[functions."api"]
  timeout = 26

[functions."warm"]
  schedule = "*/5 * * * *"

# API — proxy /api/* to the Express serverless function (path preserved)
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api"
  status = 200
  force = true

# React Router SPA fallback
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# ── Caching ─────────────────────────────────────────────────────────────
# CRA emits content-hashed filenames under /static, so they can be cached
# forever and treated as immutable.
[[headers]]
  for = "/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Template assets (images/css/fonts) are not hashed — cache for a week with
# revalidation rather than 0/1h.
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=604800"

# Public CMS JSON is cached at the origin (see server Cache-Control headers).
# This mirrors s-maxage for Netlify's CDN on API responses.
[[headers]]
  for = "/api/public/*"
  [headers.values]
    Cache-Control = "public, max-age=60, s-maxage=60, stale-while-revalidate=300"
