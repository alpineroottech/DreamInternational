# Dream International — Netlify (site + /admin + /api on one domain)

[build]
  command = "npm run netlify-build"
  publish = "build"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"
  REACT_APP_API_URL = "/api"
  NODE_ENV = "production"
  # CRA treats ESLint warnings as errors when CI=true (Netlify sets this by default)
  CI = "false"

[functions]
  node_bundler = "esbuild"
  external_node_modules = ["@prisma/client", ".prisma"]
  included_files = [
    "node_modules/.prisma/**",
    "node_modules/@prisma/**",
    "netlify/functions/node_modules/.prisma/**",
    "netlify/functions/node_modules/@prisma/**"
  ]

[functions."api"]
  timeout = 26

# API — proxy /api/* to the Express serverless function (path preserved)
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api"
  status = 200
  force = true

# React Router SPA fallback
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
