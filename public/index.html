  <!--==============================
	  Google Fonts (deduped preconnect)
	============================== -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&family=Manrope:wght@200..800&family=Montez&display=swap"

  <!--==============================
	    Critical CSS (render-blocking — layout + theme)
	============================== -->
  <!-- Bootstrap (grid/layout) -->
  <link rel="stylesheet" href="/assets/css/bootstrap.min.css">
  <!-- Theme Custom CSS -->
  <link rel="stylesheet" href="/assets/css/style.css">

  <!--==============================
	    Non-critical CSS — loaded async so it doesn't block first paint.
	    (Icons, lightbox, and the standalone swiper bundle. Swiper's own
	    styles are also imported per-component via `swiper/css`.)
	============================== -->
  <link rel="preload" as="style" href="/assets/css/fontawesome.min.css"
    onload="this.onload=null;this.rel='stylesheet'">
  <link rel="preload" as="style" href="/assets/css/magnific-popup.min.css"
    onload="this.onload=null;this.rel='stylesheet'">
  <link rel="preload" as="style" href="/assets/css/swiper-bundle.min.css"
    onload="this.onload=null;this.rel='stylesheet'">
